name: Clip Watch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: clip-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clip-watch
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run clip watch
        env:
          XBL_API_KEY: ${{ secrets.XBL_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.name "clip-watch-bot"
          git config user.email "[email protected]"
          git add state.json media.json
          if git diff --cached --quiet; then
            echo "No new clips; nothing to commit."
          else
            git commit -m "Update clip-watch state [skip ci]"
            git push
          fi
